version: '3.8'

services:
    client:
      build: client/
      restart: always
      ports:
        - 80:80
        - 443:443
      environment:
        - WEB_PORT=80
      networks:
        - client-network
      volumes:
        - ./nginx/conf:/etc/nginx/conf.d/:ro
        - ./certbot/www:/var/www/certbot/:ro
        - ./certbot/conf/:/etc/nginx/ssl/:ro
    certbot:
      image: certbot/certbot:latest
      volumes:
        - ./certbot/www/:/var/www/certbot/:rw
        - ./certbot/conf/:/etc/letsencrypt/:rw

networks:
    client-network: