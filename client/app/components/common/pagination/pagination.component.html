<mat-card *ngIf="loading == false">
    <mat-card-content>
        <div class="flex flex-row justify-center items-center full-width padded-children-content-horizontal max-sm:text-xs">
            <!-- current page controller -->
            <div class="nav-bar flex flex-row justify-center items-start">
                <!-- move first/previous -->
                <mat-icon (click)="setPageToFirst()">first_page</mat-icon>
                <mat-icon (click)="decrementPage()">navigate_before</mat-icon>

                <!-- current page -->
                <span>Page</span>
                <div class="padded-content">
                    <input class="page-input text-center" matInput type="number" name="page" [(ngModel)]="page">
                </div>
                
                <!-- total pages -->
                <span>of</span>
                <span>{{ totalPages }}</span>

                <!-- move next/last -->
                <mat-icon (click)="incrementPage()">navigate_next</mat-icon>
                <mat-icon (click)="setPageToLast()">last_page</mat-icon>
            </div>
            <!-- items per page controller -->
            <div class="flex flex-row max-sm:flex-col justify-center items-center max-sm:text-center">
                <span>Items per page:</span>
                <input class="page-input text-center" matInput type="number" name="size" (change)="setSize()" [(ngModel)]="size">
            </div>
        </div>
    </mat-card-content>
</mat-card>
