<mat-toolbar class="mat-elevation-z8 flex flex-row justify-center items-center" color="primary">

  <!-- Site Header Info -->
  <div class="justify-center items-center flex flex-col grow" routerLink="">
    <div class="header-title"><strong>{{ settings.siteName }}</strong></div>
    <div class="header-credit flex flew-row items-center">By {{ settings.author }} <div class="padded-content">(Copyright, &copy; {{ settings.copyright }})</div></div>
  </div>

  <!-- Nav Menu -->
  <div>
    <button mat-raised-button color="accent" [matMenuTriggerFor]="navmenu" aria-label="Navigation Menu">
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #navmenu="matMenu">

      <!-- links -->
      <span *ngFor="let menuLink of menuLinks">
        <!-- check if you need to be logged in to display -->
        <span *ngIf="menuLink.requiresLogin == false || this.user.loggedIn">
          <!-- check if you need to be editor to display -->
          <span *ngIf="menuLink.requiresEditor == false || (this.user.role == 'Owner' || this.user.role == 'Editor')">
            <!-- check if you need to be owner to display -->
            <span *ngIf="menuLink.requiresOwner == false || this.user.role == 'Editor'">
              <button mat-menu-item (click)="navigate(menuLink.path)" aria-label="Navigation Button">{{ menuLink.label }}</button>
            </span>
          </span>
        </span>  
      </span>

      <div *ngIf="!this.user.loggedIn">
        <span>
          <button mat-menu-item (click)="navigate('/login')" aria-label="Login Button">Login</button>
        </span>
        <span>
          <button mat-menu-item (click)="navigate('/register')" aria-label="Register Button">Register</button>
        </span>
      </div>
      <div *ngIf="this.user.loggedIn">
        <span>
          <button mat-menu-item (click)="navigate('/profile')" aria-label="Profile Button">Profile</button>
        </span>
        <span>
          <button mat-menu-item (click)="logout()" aria-label="Logout Button">Logout</button>
        </span>
      </div>
    </mat-menu>
  </div>
</mat-toolbar>
