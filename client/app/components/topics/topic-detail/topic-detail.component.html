<div *ngIf="!loading" class="list-wrapper flex flex-col justify-start items-center">
    <div class="list-container">
      <mat-card>
        <mat-card-content>
            <div class="flex flex-col justify-start items-start">
                <mat-card-subtitle class="card-subtitle">{{ protectedData.title }}</mat-card-subtitle>
                <div class="full-width flex flex-row justify-start items-center" *ngIf="user.role == 'Owner' || user.role == 'Editor'">
                    <button class="full-width" routerLink="{{'/topics/edit/' + protectedData.id}}" color="accent" mat-raised-button aria-label="Edit topic">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button (click)="deleteItem()" color="warn" mat-raised-button aria-label="Delete topic">
                        <mat-icon>delete_forever</mat-icon>
                    </button>
                </div>
            </div>
        </mat-card-content>
    </mat-card>
  </div>
</div>
